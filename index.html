<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowAI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  background: #1a1a1a;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
  border-bottom: 1px solid #333;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.message {
  margin: 10px 0;
  max-width: 80%;
  padding: 10px;
  border-radius: 10px;
}

.user {
  background: #4caf50;
  align-self: flex-end;
}

.bot {
  background: #222;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: #1a1a1a;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #4caf50;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #45a049;
}
</style>
</head>

<body>

<header>🤖 FlowAI</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Digite algo..." />
  <button onclick="send()">Enviar</button>
</div>

<script>
const API_KEY = "SUA_CHAVE_AQUI";

function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const msg = document.createElement("div");
  msg.classList.add("message", type);
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  addMessage("Digitando...", "bot");

  try {
    const response = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contents: [
            {
              parts: [{ text: text }]
            }
          ]
        })
      }
    );

    const data = await response.json();

    document.querySelectorAll(".bot").forEach(el => {
      if (el.innerText === "Digitando...") el.remove();
    });

    if (data.candidates) {
      const reply = data.candidates[0].content.parts[0].text;
      addMessage(reply, "bot");
    } else {
      addMessage("Erro ao responder 😢", "bot");
      console.log(data);
    }

  } catch (e) {
    addMessage("Erro de conexão 😢", "bot");
    console.error(e);
  }
}
</script>

</body>
</html>
